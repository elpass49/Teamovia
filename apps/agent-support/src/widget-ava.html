<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ava — Agent Conversationnel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; }

    :root {
      --c-accent:      #00C9A7;
      --c-accent-dark: #00A888;
      --c-accent-soft: rgba(0,201,167,.12);
      --c-bg:          #0D1117;
      --c-surface:     #161B22;
      --c-surface-2:   #1C2330;
      --c-border:      #2D3748;
      --c-user-bubble: #0A3D2E;
      --c-text:        #E6EDF3;
      --c-text-muted:  #7D8590;
      --c-text-faint:  #3D444D;
      --c-success:     #00C9A7;
      --c-error:       #F85149;
      --shadow:        0 20px 60px rgba(0,0,0,.7);
    }

    #ava-launcher {
      position: fixed; bottom: 24px; right: 24px;
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, var(--c-accent), #0099CC);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,201,167,.5);
      transition: transform 200ms ease, box-shadow 200ms ease;
      z-index: 9998;
    }
    #ava-launcher:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(0,201,167,.7); }
    #ava-launcher .icon-open  { display: block; }
    #ava-launcher .icon-close { display: none; }
    #ava-launcher.open .icon-open  { display: none; }
    #ava-launcher.open .icon-close { display: block; }

    #ava-badge {
      position: absolute; top: -3px; right: -3px;
      width: 20px; height: 20px; background: var(--c-error);
      border-radius: 50%; font-size: 10px; font-weight: 700;
      color: #fff; display: none; align-items: center; justify-content: center;
      border: 2px solid #f5f5f5;
    }
    #ava-badge.visible { display: flex; }

    #ava-window {
      position: fixed; bottom: 96px; right: 24px;
      width: 380px; max-height: 580px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: 20px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden;
      z-index: 9999;
      opacity: 0; transform: translateY(20px) scale(.96);
      pointer-events: none;
      transition: opacity 250ms ease, transform 250ms ease;
    }
    #ava-window.open {
      opacity: 1; transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    /* Header */
    #ava-header {
      padding: 14px 18px;
      background: linear-gradient(135deg, #0A2A20, #0A1E2A);
      border-bottom: 1px solid var(--c-border);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    #ava-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--c-accent), #0099CC);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0,201,167,.4);
    }
    #ava-header-info { flex: 1; }
    #ava-name { font-size: 14px; font-weight: 700; color: var(--c-text); }
    #ava-tagline { font-size: 11px; color: var(--c-accent); margin-top: 1px; }
    #ava-status { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    #ava-status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--c-success); animation: pulse 2s ease-in-out infinite;
    }
    #ava-status-label { font-size: 10px; color: var(--c-text-muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    #ava-close {
      background: none; border: none; cursor: pointer;
      color: var(--c-text-muted); padding: 4px; border-radius: 6px; display: flex;
    }
    #ava-close:hover { color: var(--c-text); }

    /* Messages */
    #ava-messages {
      flex: 1; overflow-y: auto; padding: 18px 14px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    #ava-messages::-webkit-scrollbar { width: 3px; }
    #ava-messages::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 3px; }

    .ava-msg { display: flex; flex-direction: column; max-width: 85%; gap: 3px; animation: msgIn 200ms ease both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .ava-msg.user  { align-self: flex-end; align-items: flex-end; }
    .ava-msg.agent { align-self: flex-start; align-items: flex-start; }

    .ava-bubble {
      padding: 9px 13px; border-radius: 16px;
      font-size: 13.5px; line-height: 1.55; color: var(--c-text);
      word-break: break-word; white-space: pre-wrap;
    }
    .ava-msg.user  .ava-bubble { background: var(--c-user-bubble); border-bottom-right-radius: 3px; border: 1px solid rgba(0,201,167,.2); }
    .ava-msg.agent .ava-bubble { background: var(--c-surface-2); border: 1px solid var(--c-border); border-bottom-left-radius: 3px; }
    .ava-time { font-size: 10px; color: var(--c-text-faint); font-family: monospace; }

    .ava-typing {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 14px; background: var(--c-surface-2);
      border: 1px solid var(--c-border); border-radius: 16px;
      border-bottom-left-radius: 3px; align-self: flex-start;
    }
    .ava-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--c-accent); animation: typing 1.2s ease-in-out infinite;
    }
    .ava-dot:nth-child(2){animation-delay:.15s}
    .ava-dot:nth-child(3){animation-delay:.3s}
    @keyframes typing { 0%,80%,100%{transform:scale(.7);opacity:.3} 40%{transform:scale(1);opacity:1} }

    .ava-system {
      align-self: center; font-size: 11px; color: var(--c-text-faint);
      padding: 3px 10px; background: var(--c-surface-2);
      border-radius: 20px; border: 1px solid var(--c-border);
    }
    .ava-system.error { color: var(--c-error); }

    /* Input */
    #ava-input-area {
      padding: 10px 14px 14px; background: var(--c-surface);
      border-top: 1px solid var(--c-border);
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    #ava-input {
      flex: 1; background: var(--c-surface-2);
      border: 1px solid var(--c-border); border-radius: 10px;
      padding: 9px 12px; color: var(--c-text);
      font-family: inherit; font-size: 13px; line-height: 1.4;
      resize: none; outline: none; min-height: 40px; max-height: 100px;
      transition: border-color 180ms;
    }
    #ava-input::placeholder { color: var(--c-text-faint); }
    #ava-input:focus { border-color: var(--c-accent); }

    #ava-send {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--c-accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: #0D1117;
      transition: background 180ms, transform 180ms, opacity 180ms;
      font-weight: 700;
    }
    #ava-send:hover:not(:disabled) { background: var(--c-accent-dark); transform: scale(1.05); }
    #ava-send:disabled { opacity: .3; cursor: not-allowed; }

    #ava-footer {
      text-align: center; font-size: 10px;
      color: var(--c-text-faint); padding: 5px 0 9px;
    }
    #ava-footer a { color: var(--c-text-faint); text-decoration: none; }
    #ava-footer a:hover { color: var(--c-accent); }

    @media (max-width: 440px) {
      #ava-window { right:0;left:0;bottom:0;width:100%;max-height:90dvh;border-radius:20px 20px 0 0; }
    }
  </style>
</head>
<body>

<button id="ava-launcher" aria-label="Parler à Ava">
  <span id="ava-badge"></span>
  <svg class="icon-open" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<div id="ava-window" role="dialog" aria-modal="true" aria-label="Chat avec Ava" aria-hidden="true">
  <div id="ava-header">
    <div id="ava-avatar">✨</div>
    <div id="ava-header-info">
      <div id="ava-name">Ava</div>
      <div id="ava-tagline">Agent conversationnel</div>
      <div id="ava-status">
        <span id="ava-status-dot"></span>
        <span id="ava-status-label">Initialisation...</span>
      </div>
    </div>
    <button id="ava-close" aria-label="Fermer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div id="ava-messages" role="log" aria-live="polite"></div>

  <div id="ava-input-area">
    <textarea id="ava-input" placeholder="Initialisation..." rows="1" disabled maxlength="4000"></textarea>
    <button id="ava-send" disabled aria-label="Envoyer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div id="ava-footer">Propulsé par <a href="https://teamovia.com" target="_blank">Teamovia</a></div>
</div>

<script>
(function () {
  'use strict';

  var WORKSPACE_TOKEN = 'b5299bf5-ad3a-4072-966e-8d4f4e94396e';
  var API_URL         = 'https://teamovia.onrender.com/v1';

  var state = { sessionId: null, isOpen: false, isLoading: false };

  var launcher    = document.getElementById('ava-launcher');
  var badge       = document.getElementById('ava-badge');
  var chatWin     = document.getElementById('ava-window');
  var messages    = document.getElementById('ava-messages');
  var input       = document.getElementById('ava-input');
  var sendBtn     = document.getElementById('ava-send');
  var closeBtn    = document.getElementById('ava-close');
  var statusLabel = document.getElementById('ava-status-label');
  var statusDot   = document.getElementById('ava-status-dot');

  function toggle() {
    state.isOpen = !state.isOpen;
    launcher.classList.toggle('open', state.isOpen);
    chatWin.classList.toggle('open', state.isOpen);
    chatWin.setAttribute('aria-hidden', String(!state.isOpen));
    if (state.isOpen) {
      badge.classList.remove('visible');
      badge.textContent = '';
      if (!state.sessionId) initSession();
      setTimeout(function() { input.focus(); }, 260);
    }
  }

  launcher.addEventListener('click', toggle);
  closeBtn.addEventListener('click', toggle);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && state.isOpen) toggle();
  });

  function initSession() {
    setStatus('Connexion...', false);
    fetch(API_URL + '/agents/ava/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-workspace-token': WORKSPACE_TOKEN },
      body: JSON.stringify({ channel: 'chat' }),
    })
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(session) {
      state.sessionId = session.id;
      setStatus('En ligne', true);
      appendSystem('Bonjour ! Je suis Ava 👋 Comment puis-je vous aider aujourd\'hui ?');
      enableInput();
    })
    .catch(function(err) {
      setStatus('Hors ligne', false);
      appendSystem('Impossible de se connecter. Réessayez.', true);
      console.error('[Ava]', err);
    });
  }

  function sendMessage() {
    var content = input.value.trim();
    if (!content || state.isLoading || !state.sessionId) return;
    appendMessage('user', content);
    input.value = '';
    input.style.height = '';
    updateSendState();
    var typingEl = appendTyping();
    state.isLoading = true;
    sendBtn.disabled = true;

    fetch(API_URL + '/agents/ava/sessions/' + state.sessionId + '/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-workspace-token': WORKSPACE_TOKEN },
      body: JSON.stringify({ content: content }),
    })
    .then(function(res) {
      typingEl.remove();
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      appendMessage('agent', data.message.content);
      if (!state.isOpen) {
        var count = (parseInt(badge.textContent || '0') || 0) + 1;
        badge.textContent = count > 9 ? '9+' : String(count);
        badge.classList.add('visible');
      }
    })
    .catch(function(err) {
      if (typingEl.parentNode) typingEl.remove();
      appendSystem("Oups, une erreur s'est produite. Réessayez !", true);
      console.error('[Ava]', err);
    })
    .finally(function() {
      state.isLoading = false;
      updateSendState();
      input.focus();
    });
  }

  input.addEventListener('input', function() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    updateSendState();
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  function updateSendState() {
    sendBtn.disabled = !input.value.trim() || state.isLoading || !state.sessionId;
  }
  function enableInput() {
    input.disabled = false;
    input.placeholder = 'Écrivez votre message...';
    updateSendState();
  }
  function appendMessage(role, content) {
    var wrap   = document.createElement('div');
    wrap.className = 'ava-msg ' + role;
    var bubble = document.createElement('div');
    bubble.className = 'ava-bubble';
    bubble.textContent = content;
    var time   = document.createElement('div');
    time.className = 'ava-time';
    time.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messages.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }
  function appendSystem(text, isError) {
    var el = document.createElement('div');
    el.className = 'ava-system' + (isError ? ' error' : '');
    el.textContent = text;
    messages.appendChild(el);
    scrollToBottom();
    return el;
  }
  function appendTyping() {
    var el = document.createElement('div');
    el.className = 'ava-typing';
    el.innerHTML = '<div class="ava-dot"></div><div class="ava-dot"></div><div class="ava-dot"></div>';
    messages.appendChild(el);
    scrollToBottom();
    return el;
  }
  function setStatus(label, online) {
    statusLabel.textContent = label;
    statusDot.style.background = online ? 'var(--c-success)' : 'var(--c-text-faint)';
    statusDot.style.animation  = online ? '' : 'none';
  }
  function scrollToBottom() {
    messages.scrollTop = messages.scrollHeight;
  }
})();
</script>
</body>
</html>
